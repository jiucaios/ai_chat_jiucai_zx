<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能体育问答系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="navbar">
    <div class="navbar-left">智能体育问答系统</div>
    <div class="navbar-right">
      <button id="homeBtn" class="glass-btn">返回我的主页</button>
    </div>
  </header>

  <!-- 主体内容 -->
  <main class="main-container">
    <!-- 左侧留白区域（扩大尺寸） -->
    <aside class="sidebar"></aside>

    <!-- 右侧问答区域（缩小宽度） -->
    <section class="chat-container">
      <!-- 聊天记录展示区 -->
      <div class="chat-history" id="chatHistory"></div>

      <!-- 输入区域 -->
      <div class="input-container">
        <textarea 
          id="messageInput" 
          class="glass-input" 
          placeholder="请输入你的体育问题，例如：篮球规则有哪些？"
          rows="4"></textarea>
        <button id="sendBtn" class="glass-btn send-btn">→</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
